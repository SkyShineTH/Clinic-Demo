# Optional production deploy to Vercel. Run manually from Actions → "Deploy (Vercel)" → Run workflow.
# Repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Create token: Vercel → Account Settings → Tokens. IDs: Project → Settings → General.
# Tip: connecting the GitHub repo in the Vercel dashboard gives preview + prod deploys without this file.
name: Deploy (Vercel)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./
